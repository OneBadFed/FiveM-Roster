<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ════════════════════════════════════════════════════════════════════
     SETTINGS STUDIO v2 — layered-glass redesign
     Hierarchy: page 34/800 · section card 17/700 · label 13.5/650 · desc 12/450 · helper 11
     Elevation: bg #0d1016 → card #151922 → input #1c212c → hover #242b37 → focus #293446
     Borders are replaced by elevation, inner highlights and shadows. 8px grid. 180ms motion.
     ════════════════════════════════════════════════════════════════════ */
  :root{
    --bg:#0d1016; --e1:#151922; --e2:#1c212c; --e3:#242b37; --e4:#293446;
    --hair:rgba(255,255,255,.055); --hi:inset 0 1px 0 rgba(255,255,255,.07);
    --txt:#eef1f6; --txt-2:#a9b1bd; --txt-3:#7f8894;
    --accent:#4f8ee8; --accent-2:#6aa3f2; --accent-soft:rgba(79,142,232,.16);
    --green:#5fbd77; --green-soft:rgba(95,189,119,.14);
    --amber:#d9ab52; --amber-soft:rgba(217,171,82,.13);
    --red:#e0685f; --red-soft:rgba(224,104,95,.13);
    --purple:#a08df0; --purple-soft:rgba(160,141,240,.14);
    --cyan:#5fb8c9; --cyan-soft:rgba(95,184,201,.13);
    --sh-1:0 1px 2px rgba(0,0,0,.35);
    --sh-2:0 2px 6px rgba(0,0,0,.35),0 8px 24px -12px rgba(0,0,0,.6);
    --sh-3:0 4px 12px rgba(0,0,0,.4),0 18px 48px -16px rgba(0,0,0,.7);
    --ease:cubic-bezier(.2,.7,.2,1); --t:180ms;
    --r-in:12px; --r-card:18px;
    --mono:'Roboto Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{color:var(--txt);font-family:'Inter',Arial,sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;
       background:
         radial-gradient(1100px 560px at 16% -12%, rgba(79,142,232,.10), transparent 58%),
         radial-gradient(900px 560px at 104% -4%, rgba(160,141,240,.07), transparent 55%),
         radial-gradient(700px 500px at -4% 104%, rgba(95,189,119,.05), transparent 55%),
         var(--bg);}
  .mono{font-family:var(--mono);}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--e3);border-radius:8px;border:3px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:var(--e4);background-clip:padding-box;border:3px solid transparent;}
  ::-webkit-scrollbar-track{background:transparent;}
  button{font-family:inherit;}
  button:focus-visible,input:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px;}
  svg{display:block;}

  .app{display:grid;grid-template-columns:246px 1fr;height:100vh;}

  /* ─── sidebar ─── */
  .side{display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(255,255,255,.028),rgba(255,255,255,.006)),rgba(13,16,22,.6);
        backdrop-filter:blur(18px) saturate(1.25);-webkit-backdrop-filter:blur(18px) saturate(1.25);box-shadow:1px 0 0 var(--hair);}
  .brand{display:flex;align-items:center;gap:11px;padding:20px 18px 14px;}
  .brand .badge{width:38px;height:38px;border-radius:12px;background:linear-gradient(155deg,rgba(79,142,232,.34),rgba(79,142,232,.08));
        color:#c4dbff;display:flex;align-items:center;justify-content:center;flex:0 0 auto;box-shadow:var(--hi),0 8px 20px -10px rgba(79,142,232,.7);}
  .brand .badge svg{width:19px;height:19px;}
  .brand b{font-size:14px;font-weight:800;letter-spacing:-.01em;display:block;line-height:1.15;}
  .brand small{font-size:9.5px;font-weight:600;color:var(--txt-3);text-transform:uppercase;letter-spacing:.14em;}
  .searchw{position:relative;margin:2px 14px 14px;}
  .searchw .mag{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--txt-3);pointer-events:none;transition:color var(--t),transform var(--t) var(--ease);}
  .searchw input{width:100%;background:var(--e2);border:none;color:var(--txt);border-radius:var(--r-in);padding:9px 44px 9px 33px;font-size:12px;font-family:inherit;outline:none;
        box-shadow:var(--hi),var(--sh-1);transition:background var(--t),box-shadow var(--t);}
  .searchw input::placeholder{color:var(--txt-3);}
  .searchw input:hover{background:var(--e3);}
  .searchw input:focus{background:var(--e4);box-shadow:var(--hi),0 0 0 3px var(--accent-soft),var(--sh-2);}
  .searchw:focus-within .mag{color:var(--accent-2);transform:translateY(-50%) scale(1.12);}
  .searchw kbd{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:9.5px;font-weight:700;font-family:inherit;color:var(--txt-3);
        background:var(--e1);border-radius:6px;padding:3px 6px;box-shadow:var(--hi),0 1px 0 rgba(0,0,0,.4);letter-spacing:.04em;pointer-events:none;}
  .nav{flex:1 1 0;min-height:0;overflow-y:auto;padding:0 12px 8px;}
  .ngroup{font-size:9.5px;font-weight:700;color:var(--txt-3);text-transform:uppercase;letter-spacing:.14em;padding:14px 10px 6px;}
  .nitem{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:var(--txt-2);
         border-radius:12px;padding:8px 10px;margin-bottom:2px;font-size:12.5px;font-weight:600;cursor:pointer;position:relative;
         transition:background var(--t),color var(--t),transform var(--t) var(--ease);}
  .nitem::before{content:"";position:absolute;left:-1px;top:50%;transform:translateY(-50%) scaleY(0);width:3px;height:18px;border-radius:3px;
         background:var(--a,var(--accent));box-shadow:0 0 10px 0 var(--a,var(--accent));transition:transform var(--t) var(--ease);}
  .nitem:hover{background:var(--e2);color:var(--txt);}
  .nitem:active{transform:scale(.985);}
  .nitem.active{background:linear-gradient(155deg,color-mix(in srgb,var(--a,var(--accent)) 16%,transparent),color-mix(in srgb,var(--a,var(--accent)) 5%,transparent)),var(--e2);
         color:var(--txt);box-shadow:var(--hi),var(--sh-1);}
  .nitem.active::before{transform:translateY(-50%) scaleY(1);}
  .nitem .nico{width:27px;height:27px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--txt-3);
        background:var(--e2);box-shadow:var(--hi);transition:color var(--t),background var(--t),box-shadow var(--t);}
  .nitem.active .nico{color:color-mix(in srgb,var(--a,var(--accent)) 65%,#fff);background:color-mix(in srgb,var(--a,var(--accent)) 20%,var(--e2));
        box-shadow:var(--hi),0 0 14px -4px var(--a,var(--accent));}
  .nitem .nico svg{width:14px;height:14px;}
  .nitem .nl{flex:1;}
  .nitem .ndot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px 0 var(--accent);opacity:0;transform:scale(.4);transition:opacity var(--t),transform var(--t) var(--ease);flex:0 0 auto;}
  .nitem.dirty .ndot{opacity:1;transform:scale(1);}
  .nitem .nhits{font-size:9px;font-weight:800;color:#cfe1ff;background:var(--accent-soft);border-radius:999px;padding:1px 7px;display:none;box-shadow:var(--hi);}
  .nitem.hashits .nhits{display:inline-block;}
  .sfoot{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px;box-shadow:0 -1px 0 var(--hair);}
  .pill{font-size:9.5px;font-weight:600;color:var(--txt-3);background:var(--e2);padding:3px 9px;border-radius:999px;letter-spacing:.04em;box-shadow:var(--hi);display:inline-flex;align-items:center;gap:5px;}
  .pill svg{width:11px;height:11px;flex:0 0 auto;opacity:.8;}
  .reload{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--e2);border:none;color:var(--txt-2);border-radius:var(--r-in);
          padding:8px 10px;font-size:11.5px;font-weight:600;cursor:pointer;box-shadow:var(--hi),var(--sh-1);transition:background var(--t),color var(--t),transform var(--t) var(--ease),box-shadow var(--t);}
  .reload:hover{background:var(--e3);color:var(--txt);transform:translateY(-1px);box-shadow:var(--hi),var(--sh-2);}
  .reload:active{transform:scale(.97);}
  .reload svg{width:13px;height:13px;}

  /* ─── content ─── */
  .main{min-width:0;position:relative;}
  .content{height:100vh;overflow-y:auto;padding:40px 48px 120px;}
  .ph{margin-bottom:32px;animation:rise .34s var(--ease) both;}
  .ph h1{margin:0;font-size:34px;font-weight:800;letter-spacing:-.025em;line-height:1.1;}
  .ph .pdesc{margin:10px 0 0;font-size:13px;color:var(--txt-2);max-width:58ch;line-height:1.6;font-weight:450;}
  .ph .pmeta{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
  .ph .pmeta .pill b{color:var(--txt-2);font-weight:700;}
  .ph-top{display:flex;align-items:flex-start;gap:15px;}
  .ph-tx{min-width:0;}
  .ph-ico{width:50px;height:50px;flex:0 0 auto;border-radius:15px;display:flex;align-items:center;justify-content:center;margin-top:3px;
        color:color-mix(in srgb,var(--a,var(--accent)) 72%,#fff);background:linear-gradient(155deg,color-mix(in srgb,var(--a,var(--accent)) 20%,var(--e2)),var(--e2));box-shadow:var(--hi),var(--sh-1);}
  .ph-ico svg{width:25px;height:25px;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

  .callout{background:linear-gradient(155deg,var(--amber-soft),transparent),var(--e1);border-radius:var(--r-card);padding:14px 18px;margin-bottom:20px;
        font-size:11.5px;color:var(--amber);line-height:1.6;box-shadow:var(--hi),var(--sh-1);animation:rise .3s var(--ease) both;}
  .callout.err{background:linear-gradient(155deg,var(--red-soft),transparent),var(--e1);color:var(--red);}
  .callout b{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-weight:800;}
  .callout .mono{font-size:10.5px;opacity:.92;}

  .card{background:linear-gradient(180deg,rgba(255,255,255,.022),rgba(255,255,255,0) 46%),var(--e1);border-radius:var(--r-card);
        box-shadow:var(--hi),var(--sh-2);margin-bottom:24px;padding:22px 24px 24px;position:relative;overflow:visible;
        animation:rise .34s var(--ease) both;transition:box-shadow var(--t);}
  .card:hover{box-shadow:var(--hi),var(--sh-3);}
  .card::after{content:"";position:absolute;inset:0 0 auto 0;height:2px;border-radius:var(--r-card) var(--r-card) 0 0;
        background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--a,var(--accent)) 45%,transparent) 30%,color-mix(in srgb,var(--a,var(--accent)) 45%,transparent) 70%,transparent);
        opacity:.5;pointer-events:none;}
  .card:nth-of-type(2){animation-delay:.04s;} .card:nth-of-type(3){animation-delay:.08s;} .card:nth-of-type(4){animation-delay:.12s;}
  .card-h{display:flex;align-items:center;gap:11px;margin-bottom:18px;}
  .card-h .cico{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
        color:color-mix(in srgb,var(--a,var(--accent)) 70%,#fff);background:color-mix(in srgb,var(--a,var(--accent)) 14%,var(--e2));box-shadow:var(--hi);}
  .card-h .cico svg{width:16px;height:16px;}
  .card-h b{font-size:17px;font-weight:700;letter-spacing:-.01em;}
  .card-h small{margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--txt-3);letter-spacing:.02em;}

  .grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:24px 32px;}
  .setting{min-width:0;position:relative;}
  .setting.hide{display:none;}
  .setting .slab{display:flex;align-items:center;gap:6px;font-size:13.5px;font-weight:650;letter-spacing:-.005em;margin-bottom:3px;}
  .slab-ico{display:inline-flex;color:var(--txt-3);flex:0 0 auto;transition:color var(--t);}
  .slab-ico svg{width:14px;height:14px;}
  .setting:focus-within .slab-ico,.setting.mod .slab-ico{color:color-mix(in srgb,var(--accent) 60%,var(--txt-3));}
  .moddot{position:absolute;left:-13px;top:6px;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px 0 var(--accent);opacity:0;transform:scale(.3);transition:opacity var(--t),transform var(--t) var(--ease);}
  .setting.mod .moddot{opacity:1;transform:scale(1);}
  .undo{background:none;border:none;color:var(--txt-3);cursor:pointer;padding:0 2px;font-size:13px;line-height:1;opacity:0;transition:opacity var(--t),color var(--t);}
  .setting.mod .undo{opacity:.85;} .undo:hover{color:var(--txt);}
  .setting .sdesc{font-size:12px;color:var(--txt-3);font-weight:450;line-height:1.55;margin-bottom:10px;max-width:46ch;
        display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .setting .serr{display:none;font-size:10.5px;color:var(--red);line-height:1.45;margin-top:7px;font-weight:550;}
  .setting.modehide{display:none;} /* hidden because the selected PATROL.MODE doesn't use this field */
  /* ranks & labels */
  .rlhead{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;}
  .rladd{display:inline-flex;gap:8px;align-items:stretch;}
  .rladd .in{width:200px;}
  .rlrow{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--e1);border-radius:12px;box-shadow:var(--hi),var(--sh-1);margin-bottom:8px;}
  .rlav{width:34px;height:34px;border-radius:10px;background:var(--e3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;overflow:hidden;flex:0 0 auto;}
  .rlav img{width:100%;height:100%;object-fit:contain;display:block;}
  .rlnm{min-width:160px;font-weight:700;font-size:13px;}
  .rlnm small{display:block;color:var(--txt-3);font-weight:500;font-size:10.5px;margin-top:1px;}
  .rlchips{display:flex;flex-wrap:wrap;gap:6px;flex:1;}
  .rlt{cursor:pointer;font-size:11px;font-weight:650;border-radius:999px;padding:4px 11px;background:var(--e2);color:var(--txt-3);box-shadow:var(--hi);transition:background .15s,color .15s,transform .15s;user-select:none;}
  .rlt:hover{color:var(--txt);background:var(--e3);transform:translateY(-1px);}
  .rlt.on{background:var(--green-t);color:var(--green-f);}
  .rlt .rldel{cursor:pointer;margin-left:5px;opacity:.7;} .rlt .rldel:hover{opacity:1;}
  .rlrow .rkbtns{flex:0 0 auto;}
  .rlrow.rkbusy{opacity:.55;pointer-events:none;}
  .tagrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .fmtex{font-family:var(--mono);font-size:11px;color:var(--txt-2);margin-top:7px;}
  /* discord sections */
  .dcst{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:650;}
  .dcdot{width:9px;height:9px;border-radius:50%;background:var(--red);}
  .dcdot.on{background:#57b85a;box-shadow:0 0 8px 0 rgba(87,184,90,.5);}
  .dcev{margin:0;padding-left:18px;color:var(--txt-2);font-size:12.5px;line-height:1.9;}
  /* compact webhook row: status · url · action buttons on one line, wrapping only when narrow */
  .dcwrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .dcwrow .dcst{flex:0 0 auto;font-size:11.5px;font-weight:650;white-space:nowrap;margin:0;}
  .dcwrow .dcurl{flex:1 1 220px;min-width:160px;margin:0;font-family:var(--mono);font-size:11.5px;}
  .dcbtn{flex:0 0 auto;background:var(--e2);border:none;color:var(--txt-2);border-radius:9px;padding:8px 13px;font-size:12px;font-weight:650;
         cursor:pointer;box-shadow:var(--hi),var(--sh-1);transition:background var(--t),color var(--t),transform var(--t) var(--ease);}
  .dcbtn:hover{background:var(--e3);color:var(--txt);transform:translateY(-1px);}
  .dcbtn:active{transform:scale(.96);}
  .dcbtn.primary{background:linear-gradient(155deg,#5a97ec,#3d7cd9);color:#fff;box-shadow:var(--hi),0 4px 14px -6px var(--accent);}
  .dcbtn.danger{color:var(--red);} .dcbtn.danger:hover{background:rgba(224,87,79,.12);color:var(--red);}
  /* embed builder — stacked collapsible sections, preview at the bottom */
  .dcseg{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px;}
  .dclb{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--txt-3);text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin:10px 0 5px;}
  .dccnt{margin-left:auto;font-family:var(--mono);font-size:9.5px;color:var(--txt-3);text-transform:none;letter-spacing:0;font-weight:500;}
  .dcta{min-height:70px;resize:vertical;font-family:inherit;line-height:1.5;width:100%;}
  .dcta-sm{min-height:46px;resize:vertical;font-family:inherit;line-height:1.5;width:100%;}
  .dcsec{border:1px solid var(--hair);border-radius:12px;margin-bottom:8px;background:var(--e1);overflow:hidden;}
  .dcsec>summary{list-style:none;cursor:pointer;padding:11px 14px;font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-2);display:flex;align-items:center;gap:8px;user-select:none;}
  .dcsec>summary::-webkit-details-marker{display:none;}
  .dcsec>summary::before{content:"";width:7px;height:7px;border-right:2px solid currentColor;border-bottom:2px solid currentColor;transform:rotate(-45deg);transition:transform .18s var(--ease);opacity:.8;}
  .dcsec[open]>summary::before{transform:rotate(45deg);}
  .dcsec>summary:hover{background:var(--e2);}
  .dcsec-b{padding:2px 14px 14px;}
  .dctog-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 0;}
  .dctog-row small{color:var(--txt-3);font-weight:500;}
  .dccolor{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .dccolin{width:120px;flex:0 0 auto;font-family:var(--mono);}
  .dcsws{display:flex;gap:6px;flex-wrap:wrap;}
  .dcsw{width:22px;height:22px;border-radius:7px;border:2px solid rgba(255,255,255,.14);cursor:pointer;padding:0;box-shadow:var(--hi);transition:transform var(--t) var(--ease);}
  .dcsw:hover{transform:scale(1.12);border-color:#fff;}
  .dcfr{background:var(--e2);border-radius:12px;padding:10px 12px 12px;margin-bottom:8px;box-shadow:var(--hi),var(--sh-1);}
  .dcfr-h{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;margin-bottom:2px;}
  .dcfr-pv{color:var(--txt-3);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .dcfr-h .gtdel{margin-left:auto;}
  .dcfr .tgl{margin-top:8px;}
  .dcm-content{color:#dbdee1;font-size:13.5px;line-height:1.45;white-space:pre-wrap;word-break:break-word;margin-bottom:6px;}
  .dcmock{background:#313338;border-radius:12px;padding:14px 16px;}
  .dcm-msg{display:flex;gap:14px;}
  .dcm-av{width:40px;height:40px;flex:0 0 auto;border-radius:50%;background:linear-gradient(155deg,#5b8def,#3d5bd9);display:flex;align-items:center;justify-content:center;}
  .dcm-av svg{width:22px;height:22px;}
  .dcm-body{flex:1;min-width:0;}
  .dcm-head{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
  .dcm-user{color:#f2f3f5;font-weight:600;font-size:15px;}
  .dcm-app{background:#5865f2;color:#fff;font-size:9.5px;font-weight:700;line-height:1;border-radius:4px;padding:2px 5px 3px;text-transform:uppercase;letter-spacing:.02em;}
  .dcm-ts{color:#949ba4;font-size:11.5px;}
  .dcm-embed{max-width:520px;background:#2b2d31;border-radius:6px;border-left:4px solid #5865F2;padding:10px 12px;color:#dbdee1;overflow:hidden;}
  .dcm-wrap{display:flex;gap:10px;} .dcm-main{flex:1;min-width:0;}
  .dcm-author{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:#fff;margin-bottom:4px;}
  .dcm-author img{width:20px;height:20px;border-radius:50%;object-fit:cover;}
  .dcm-title{font-size:14.5px;font-weight:700;color:#fff;margin-bottom:4px;word-break:break-word;}
  .dcm-desc{font-size:13px;line-height:1.45;white-space:pre-wrap;word-break:break-word;}
  .dcm-fields{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px 10px;margin-top:6px;}
  .dcm-f{min-width:0;} .dcm-f.full{grid-column:1/-1;}
  .dcm-fn{font-size:12px;font-weight:700;color:#fff;} .dcm-fv{font-size:12.5px;white-space:pre-wrap;word-break:break-word;}
  .dcm-thumb{width:64px;height:64px;border-radius:6px;object-fit:cover;flex:0 0 auto;}
  .dcm-img{width:100%;max-height:220px;object-fit:cover;border-radius:6px;margin-top:8px;display:block;}

  /* iOS toggle */

      box-shadow:var(--hi),inset 0 2px 4px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,255,255,.07);transition:background var(--t),box-shadow var(--t);}

      box-shadow:0 2px 5px rgba(0,0,0,.45),0 0 1px rgba(0,0,0,.3);transition:transform var(--t) var(--ease);}

      box-shadow:var(--hi),var(--sh-1);transition:transform var(--t) var(--ease),box-shadow var(--t);animation:chipin .2s var(--ease) both;}

  /* floating save pill */
  .savepill{position:fixed;left:50%;bottom:26px;transform:translate(-50%,140%);z-index:50;display:flex;align-items:center;gap:14px;
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.01)),rgba(22,27,36,.92);border-radius:999px;padding:10px 12px 10px 20px;
      backdrop-filter:blur(20px) saturate(1.35);-webkit-backdrop-filter:blur(20px) saturate(1.35);
      box-shadow:var(--hi),0 16px 48px -10px rgba(0,0,0,.8),0 0 30px -10px var(--accent-soft);
      transition:transform .32s var(--ease),opacity .32s;opacity:0;pointer-events:none;}
  .savepill.show{transform:translate(-50%,0);opacity:1;pointer-events:auto;}
  .savepill .spdot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px 1px var(--accent);animation:pulse 2.2s ease-in-out infinite;flex:0 0 auto;}
  @keyframes pulse{0%,100%{box-shadow:0 0 4px 0 currentColor;}50%{box-shadow:0 0 14px 2px currentColor;}}
  .savepill .sptxt{font-size:12.5px;font-weight:650;white-space:nowrap;}
  .spbtn{background:none;border:none;color:var(--txt-2);border-radius:999px;padding:8px 15px;font-size:12px;font-weight:650;cursor:pointer;transition:all var(--t);}
  .spbtn:hover{color:var(--txt);background:var(--e3);}
  .spsave{display:flex;align-items:center;gap:7px;background:linear-gradient(155deg,#5a97ec,#3d7cd9);color:#fff;border:none;border-radius:999px;padding:9px 18px;
      font-size:12.5px;font-weight:700;cursor:pointer;box-shadow:var(--hi),0 8px 22px -8px rgba(79,142,232,.9);
      transition:transform var(--t) var(--ease),box-shadow var(--t),background var(--t);}
  .spsave:hover{transform:translateY(-1px);box-shadow:var(--hi),0 12px 28px -8px rgba(79,142,232,1);}
  .spsave:active{transform:scale(.96);}
  .spsave svg{width:14px;height:14px;}
  .savepill.saving .spdot{background:var(--amber);color:var(--amber);}
  .savepill.saving .spsave{pointer-events:none;opacity:.75;}
  .savepill.saved{box-shadow:var(--hi),0 16px 48px -10px rgba(0,0,0,.8),0 0 30px -8px var(--green-soft);}
  .savepill.saved .spdot{background:var(--green);color:var(--green);animation:none;box-shadow:0 0 12px 1px var(--green);}
  .spinner{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  #toast{position:fixed;left:50%;transform:translate(-50%,180%);bottom:86px;max-width:540px;background:rgba(16,20,27,.95);border-radius:14px;
      border-left:3px solid var(--accent);color:var(--txt);padding:11px 17px;font-size:12px;font-weight:550;backdrop-filter:blur(12px);
      box-shadow:var(--hi),0 14px 36px rgba(0,0,0,.66);transition:transform .26s cubic-bezier(.2,.8,.2,1),opacity .26s,visibility 0s linear .26s;
      opacity:0;pointer-events:none;visibility:hidden;} /* fully hidden at rest — the slide alone left its top edge peeking on-screen */
  #toast.show{transform:translate(-50%,0);opacity:1;visibility:visible;transition:transform .26s cubic-bezier(.2,.8,.2,1),opacity .26s,visibility 0s;}
  #toast.err{border-left-color:var(--red);} #toast.ok{border-left-color:var(--green);}

  /* skeleton loading */
  .sk{border-radius:var(--r-card);background:var(--e1);box-shadow:var(--hi),var(--sh-1);margin-bottom:24px;overflow:hidden;position:relative;}
  .sk::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.035),transparent);transform:translateX(-100%);animation:shimmer 1.4s infinite;}
  @keyframes shimmer{to{transform:translateX(100%);}}
  .sk-h{height:36px;width:40%;margin:40px 0 10px;border-radius:10px;}
  .sk-l{height:14px;width:60%;margin-bottom:28px;border-radius:7px;}

  /* rank icons */
  .rkloading{padding:34px;text-align:center;color:var(--txt-3);font-size:13.5px;line-height:1.6;}
  .rkgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .rkcard{display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:var(--r-card,16px);background:var(--e1);box-shadow:var(--hi),var(--sh-1);transition:opacity .2s;}
  .rkcard.rkbusy{opacity:.5;pointer-events:none;}
  .rkav{width:46px;height:46px;flex:0 0 auto;border-radius:13px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--e3);box-shadow:inset 0 0 0 1px var(--hair,rgba(255,255,255,.06));}
  .rkav.has{background:var(--e2,#1a1d24);padding:3px;}
  .rkav img{width:100%;height:100%;object-fit:contain;display:block;} /* contain = the whole badge is visible, never cropped */
  .rkmono{font-size:14px;font-weight:700;letter-spacing:.02em;color:var(--txt-2);}
  .rkmeta{flex:1;min-width:0;}
  .rkmeta b{display:block;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rkmeta span{font-size:12px;color:var(--txt-3);}
  .rkbtns{display:flex;gap:7px;flex:0 0 auto;align-items:center;}
  .rkbtn{font:inherit;font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:9px;border:1px solid var(--hair,rgba(255,255,255,.08));background:var(--e2,#1a1d24);color:var(--txt);cursor:pointer;transition:background .15s,border-color .15s;}
  .rkbtn:hover{border-color:var(--accent);background:var(--accent-soft,rgba(63,134,230,.14));}
  .rkbtn.rkup{position:relative;display:inline-flex;align-items:center;}
  .rkbtn.rkdel{color:var(--txt-3);}
  .rkbtn.rkdel:hover{border-color:var(--red,#e0574f);color:var(--red,#e0574f);background:transparent;}
</style>
</head>
<body>

<script>
  /* ════ data layer — identical server contract (dispatch → cpGetConfig / cpApplyConfig) ════ */
  var DATA=null, KV={}, BASE={}, TBL={}, TBLBASE={}, TBLMETA={}, CUR='sheets', Q='', LASTSAVED=null;
  var DD={}, DDSEQ=0, DDOPEN=null; // custom-dropdown registry + open menu
  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  var toastT; function toast(m,k){ var t=$('toast'); t.textContent=m; t.className=(k||''); void t.offsetWidth; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('show'); },3200); }
  function api(success,failure,name){ var args=Array.prototype.slice.call(arguments,3); google.script.run.withSuccessHandler(success).withFailureHandler(failure||onError).dispatch(name,args); }
  function onError(e){ toast((e&&e.message)?e.message:'Something went wrong.','err'); }

  var GROUPS=[

  function cardIcon(title,gid){ var k=CARD_ICONS[title]; return (k&&ICONS[k])?ICONS[k]:(ICONS[gid]||ICONS.table); }
  function ctrlIcon(m,bk){
    if(!m) return ICONS.ftext;
    if(m.t==='bool') return ICONS.ftoggle;
    if(m.t==='color') return ICONS.fcolor;
    if(m.t==='int') return ICONS.fnum;
    if(m.t==='list' || bk==='LEAVE.LEAVE_TYPES') return ICONS.flist;
    if(m.t==='enum') return ICONS.fdrop;
    if(m.block==='SHEETS' && (bk==='SHEETS.ROSTER'||bk==='SHEETS.TRACKER'||bk==='SHEETS.FORM_RESPONSES')) return ICONS.fdrop;
    if(bk==='SCHEDULE.NIGHTLY_HOUR'||bk==='SCHEDULE.WEEKLY_RESET_HOUR'||bk==='SCHEDULE.WEEKLY_HOURS_RESET'||/^LEAVE\.(APPROVED_STATUS|EXPIRED_STATUS|RETURN_STATUS|RETURN_TYPE)$/.test(bk)) return ICONS.fdrop;
    return ICONS.ftext;
  }
  // Friendlier display labels/help for keys whose config names read wrong in the UI (display only — keys unchanged).
  var LABELS={'SHEETS.TRACKER':'LOA TRACKER','SHEETS.FORM_RESPONSES':'LOA FORM RESPONSES','SHEETS.PATROL_RESPONSES':'PATROL FORM RESPONSES','SHEETS.PATROL_LOG':'PATROL LOG TAB','SHEETS.SIGNUPS':'SIGNUP REVIEW TAB','SHEETS.SIGNUP_FORM_RESPONSES':'SIGNUP FORM RESPONSES',

    'SCHEDULE.NIGHTLY_HOUR':'NIGHTLY LEAVE CHECK','LOGGING.LOG_LEVEL':'LOG DETAIL','LOGGING.LOG_MAX_ROWS':'LOG SIZE (ROWS)','LOGGING.PERF_TIMING':'TIMING LOG',

  function secDirty(id){
    var g=SECTIONS.filter(function(x){return x.id===id;})[0];
    if(g.tables && (tblChanged('STATUSES')||tblChanged('STATUS_OVERRIDES')||tblChanged('STATUS_RULES'))) return true;
    if(g.table && tblChanged(g.table)) return true;
    if(g.custom==='ranklabels' && tblChanged('DASHBOARD_GROUPS')) return true;
    if(g.custom==='discord') return embChanged_(g.channel); // ONLY this channel's [EMBEDS] rows — one edit must not light all four Discord dots
    if(g.tablesMulti && g.tablesMulti.some(function(n){return tblChanged(n);})) return true;

    return false;

  /* ── live previews ── */
  // Discord markdown → safe HTML. Escapes BEFORE building markup and only allows http(s) links, so config text can't inject HTML.
  function dcRender(src){
    var store=[];
    function keep(html){ store.push(html); return '\u0000'+(store.length-1)+'\u0001'; }
    function e(t){ return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function inl(t){
      return String(t)
        .replace(/\|\|([\s\S]+?)\|\|/g,'<span class="dc-sp">$1</span>')
        .replace(/\*\*\*([\s\S]+?)\*\*\*/g,'<strong><em>$1</em></strong>')
        .replace(/\*\*([\s\S]+?)\*\*/g,'<strong>$1</strong>')
        .replace(/__([\s\S]+?)__/g,'<u>$1</u>')
        .replace(/~~([\s\S]+?)~~/g,'<s>$1</s>')
        .replace(/(^|[^*])\*([^*\n]+?)\*/g,'$1<em>$2</em>')
        .replace(/(^|[^_])_([^_\n]+?)_/g,'$1<em>$2</em>');
    }
    var text=String(src==null?'':src).replace(/\r\n?/g,'\n');
    text=text.replace(/```(?:[a-z0-9+#.\-]{1,15}\n)?([\s\S]*?)```/gi,function(_,c){ return keep('<div class="dc-cb"><code>'+e(c.replace(/^\n+|\n+$/g,''))+'</code></div>'); });
    text=text.replace(/``([^`]+)``|`([^`\n]+)`/g,function(_,a,b){ return keep('<code class="dc-ic">'+e(a!=null?a:b)+'</code>'); });
    text=text.replace(/<a?:([a-z0-9_]{2,32}):\d+>/gi,function(_,n){ return keep('<span class="dc-em">:'+e(n)+':</span>'); });
    text=text.replace(/<@!?\d{5,25}>/g,function(){ return keep('<span class="dc-mn">@user</span>'); });
    text=text.replace(/<@&\d{5,25}>/g,function(){ return keep('<span class="dc-mn">@role</span>'); });
    text=text.replace(/<#\d{5,25}>/g,function(){ return keep('<span class="dc-mn dc-mnc">#channel</span>'); });
    text=text.replace(/<t:-?\d{1,14}(?::[tTdDfFR])?>/g,function(){ return keep('<span class="dc-tm">🕗 in a moment</span>'); });
    text=text.replace(/@(everyone|here)\b/g,function(_,w){ return keep('<span class="dc-mn">@'+w+'</span>'); });
    text=e(text);
    text=text.replace(/\[([^\]\n]+)\]\((https?:\/\/[^\s)]+)\)/g,function(_,label,url){ return keep('<a class="dc-lk" href="'+url+'" target="_blank" rel="noopener noreferrer">'+inl(label)+'</a>'); });
    var lines=text.split('\n'), out=[], list=null, listOrd=false, quote=[], m;
    function fq(){ if(quote.length){ out.push('<blockquote class="dc-bq">'+quote.map(inl).join('<br>')+'</blockquote>'); quote=[]; } }
    function fl(){ if(list){ out.push('<'+(listOrd?'ol':'ul')+' class="dc-ls">'+list.map(function(x){return '<li>'+inl(x)+'</li>';}).join('')+'</'+(listOrd?'ol':'ul')+'>'); list=null; } }
    for(var i=0;i<lines.length;i++){ var ln=lines[i];
      if((m=ln.match(/^(#{1,3})\s+(.+)$/))){ fq(); fl(); out.push('<div class="dc-hd dc-hd'+m[1].length+'">'+inl(m[2])+'</div>'); continue; }
      if((m=ln.match(/^-#\s+(.+)$/))){ fq(); fl(); out.push('<div class="dc-st">'+inl(m[1])+'</div>'); continue; }
      if((m=ln.match(/^&gt;&gt;&gt;\s?([\s\S]*)$/))){ fl(); quote.push(m[1]); continue; }
      if((m=ln.match(/^&gt;\s?(.*)$/))){ fl(); quote.push(m[1]); continue; }
      if((m=ln.match(/^\s*[-*]\s+(.+)$/))){ fq(); if(list===null||listOrd){ fl(); list=[]; listOrd=false; } list.push(m[1]); continue; }
      if((m=ln.match(/^\s*\d+\.\s+(.+)$/))){ fq(); if(list===null||!listOrd){ fl(); list=[]; listOrd=true; } list.push(m[1]); continue; }
      fq(); fl(); out.push({t:inl(ln)});
    }
    fq(); fl();
    var html='';
    for(var j=0;j<out.length;j++){ var seg=out[j];
      if(typeof seg==='object'){ if(j>0 && typeof out[j-1]==='object') html+='<br>'; html+=seg.t; } else html+=seg;
    }
    for(var p2=0;p2<6 && /\u0000\d+\u0001/.test(html);p2++){ html=html.replace(/\u0000(\d+)\u0001/g,function(_,k){ return store[+k]==null?'':store[+k]; }); }
    return html;
  }

  /* Tiny Java-date-pattern subset (d/dd, MM/MMM/MMMM, yy/yyyy, h/hh/HH, mm, a) — enough to preview today. */
  function fmtExample(pat){
    var now=new Date();
    var MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var ML=['January','February','March','April','May','June','July','August','September','October','November','December'];
    var d=now.getDate(), mo=now.getMonth(), y=now.getFullYear(), H=now.getHours(), mi=now.getMinutes();
    var h12=(H%12)||12, ap=H<12?'AM':'PM', pad=function(n){ return (n<10?'0':'')+n; };
    return String(pat||'').replace(/yyyy/g,String(y)).replace(/yy/g,String(y).slice(-2))
      .replace(/MMMM/g,'\u0001').replace(/MMM/g,'\u0002').replace(/MM/g,pad(mo+1))
      .replace(/dd/g,pad(d)).replace(/d/g,String(d))
      .replace(/HH/g,pad(H)).replace(/hh/g,pad(h12)).replace(/h/g,String(h12))
      .replace(/mm/g,pad(mi)).replace(/a/g,ap)
      .replace(/\u0001/g,ML[mo]).replace(/\u0002/g,MS[mo]);
  }

  // Normalise an upload to a UNIFORM SQUARE that fits the icon area: draw the whole image CONTAINED + centred on a
  // transparent square canvas (never cropped/stretched), then compress to fit script storage while PRESERVING
  // TRANSPARENCY where possible — PNG (lossless) for simple icons, else WebP (lossy but keeps alpha) for detailed
  // gradient/photo art. Flat-white JPEG is a last resort only when the browser can't encode WebP.
  var ICON_CAP=16000; // must stay <= RANK_ICON_MAX_LEN_ on the server
  function processIcon(file, cb, errCb){
    if(file.size > 15*1024*1024){ errCb('That image is too large (max 15 MB).'); return; }
    var reader=new FileReader();
    reader.onerror=function(){ errCb('Could not read that file.'); };
    reader.onload=function(){
      var img=new Image();
      img.onerror=function(){ errCb('That file is not a readable image.'); };
      img.onload=function(){
        var render=function(S, fmt, q){
          var cv=document.createElement('canvas'); cv.width=S; cv.height=S;
          var ctx=cv.getContext('2d'); ctx.clearRect(0,0,S,S);
          if(fmt==='jpeg'){ ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,S,S); } // JPEG has no alpha → flat white behind
          var iw=img.naturalWidth||img.width||S, ih=img.naturalHeight||img.height||S;
          var scale=Math.min(S/iw, S/ih), dw=Math.max(1,Math.round(iw*scale)), dh=Math.max(1,Math.round(ih*scale));
          ctx.drawImage(img, Math.round((S-dw)/2), Math.round((S-dh)/2), dw, dh); // contain + centre
          try{
            if(fmt==='jpeg') return cv.toDataURL('image/jpeg', q);
            if(fmt==='webp'){ var w=cv.toDataURL('image/webp', q); return (w.indexOf('data:image/webp')===0)?w:null; } // null when the browser can't encode WebP (it silently returns a PNG)
            return cv.toDataURL('image/png');
          }catch(e){ return null; }
        };
        var uri=null;
        // 1) PNG (lossless, keeps transparency) — the largest size that fits. Flat / simple icons land here crisply.
        var pngS=[256,192,160,128,96];
        for(var i=0;i<pngS.length;i++){ var u=render(pngS[i],'png'); if(u && u.length<=ICON_CAP){ uri=u; break; } }
        // 2) Detailed image (gradients / photo) too big as PNG → WebP: lossy (small) but still KEEPS TRANSPARENCY.
        if(!uri){
          var wp=[[256,0.9],[256,0.82],[224,0.78],[192,0.74],[160,0.68],[128,0.6],[96,0.52]];
          for(var w=0;w<wp.length;w++){ var wu=render(wp[w][0],'webp',wp[w][1]); if(wu && wu.length<=ICON_CAP){ uri=wu; break; } }
        }
        // 3) Only if this browser can't encode WebP → JPEG (flat white behind; loses transparency), stepping down to fit.
        if(!uri){
          var jpg=[[256,0.85],[224,0.8],[192,0.72],[160,0.66],[128,0.6],[112,0.54],[96,0.48],[80,0.42],[64,0.36]];
          for(var k=0;k<jpg.length;k++){ var j=render(jpg[k][0],'jpeg',jpg[k][1]); if(j && j.length<=ICON_CAP){ uri=j; break; } }
        }
        if(!uri){ errCb('Could not read that image — please try a different file.'); return; } // only if the canvas itself failed (corrupt / cross-origin)
        cb(uri);
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  }

      if(tgt){ insertAt_(tgt,dph.dataset.dcph); dcSyncFromForm_(); } return; }
    var dsv=e.target.closest('[data-dcsave]');
    if(dsv){ var du=($('dcUrl')&&$('dcUrl').value.trim())||''; if(!du){ toast('Paste a webhook URL first (or use Clear).','err'); return; }
      dsv.disabled=true;
      api(function(r){ dsv.disabled=false; if($('dcUrl'))$('dcUrl').value=''; DATA.webhooks=r.channels||{}; toast(r.channel+' webhook saved.','ok'); renderSection(); },
          function(err){ dsv.disabled=false; onError(err); }, 'cpSetWebhook', du, dsv.dataset.dcsave); return; }
    var dts=e.target.closest('[data-dctest]');
    if(dts){ dts.disabled=true;
      api(function(){ dts.disabled=false; toast('Test sent — check Discord.','ok'); },
          function(err){ dts.disabled=false; onError(err); }, 'cpTestWebhook', dts.dataset.dctest); return; }
    var dcl=e.target.closest('[data-dcclear]');
    if(dcl){ dcl.disabled=true;
      api(function(r){ dcl.disabled=false; DATA.webhooks=r.channels||{}; toast(r.channel+' webhook cleared.','ok'); renderSection(); },
          function(err){ dcl.disabled=false; onError(err); }, 'cpSetWebhook', '', dcl.dataset.dcclear); return; }
    var dpg=e.target.closest('[data-dcpurge]');
    if(dpg){ if(!window.confirm('Remove ALL Discord webhooks? Every channel goes silent until new URLs are saved.')) return;
      dpg.disabled=true;
      api(function(msg){ dpg.disabled=false; DATA.webhooks={}; toast(msg||'Webhooks removed.','ok'); renderSection(); },
          function(err){ dpg.disabled=false; onError(err); }, 'cpRunAction', 'purgeWebhooks'); return; }
    var tcp=e.target.closest('[data-tagcopy]');
    if(tcp){ var tta=document.createElement('textarea'); tta.value=tcp.dataset.tagcopy; tta.style.position='fixed'; tta.style.opacity='0';
      document.body.appendChild(tta); tta.select();
      try{ document.execCommand('copy'); toast(tcp.dataset.tagcopy+' copied — paste it into a cell.','ok'); }catch(err){ toast('Copy failed — type it by hand.','err'); }
      document.body.removeChild(tta); return; }
    var rld=e.target.closest('[data-rldel]');
    if(rld){ TBL.DASHBOARD_GROUPS.splice(Number(rld.dataset.rldel),1); renderRankLabels(); updateBar(); return; }
    var rlt=e.target.closest('[data-rltog]');
    if(rlt){ rlToggle(Number(rlt.dataset.gi), rlt.dataset.rank); return; }
    var rla=e.target.closest('[data-rladd]');
    if(rla){ var rlin=$('rlNew'), rlv=((rlin&&rlin.value)||'').trim(); if(!rlv) return;
      TBL.DASHBOARD_GROUPS=TBL.DASHBOARD_GROUPS||[];
      if(!TBL.DASHBOARD_GROUPS.some(function(r){return String(r[0]).trim().toUpperCase()===rlv.toUpperCase();})) TBL.DASHBOARD_GROUPS.push([rlv,'']);
      renderRankLabels(); updateBar(); return; }
    var tc=e.target.closest('.tchip');
    if(tc){ var box=tc.closest('[data-tchips]'); var bk2=box.dataset.tchips; var cur=listOf(KV[bk2].value); var val=tc.dataset.tv;
      var has=cur.some(function(x){return x.toUpperCase()===val.toUpperCase();});
      var next=has?cur.filter(function(x){return x.toUpperCase()!==val.toUpperCase();}):cur.concat([val]);
      KV[bk2].value=next.join(', '); renderSection(); updateBar(); return; }
    var rm=e.target.closest('[data-rmc]');
    if(rm){ var box2=rm.closest('[data-chips]'); var bk3=box2.dataset.chips; var arr=listOf(KV[bk3].value); arr.splice(Number(rm.dataset.rmc),1); KV[bk3].value=arr.join(', '); renderSection(); updateBar(); return; }
    var mv=e.target.closest('[data-mvl]');
    if(mv){ var box3=mv.closest('[data-chips]'); var bk4=box3.dataset.chips; var arr2=listOf(KV[bk4].value); var ix=Number(mv.dataset.mvl); var tmp=arr2[ix-1]; arr2[ix-1]=arr2[ix]; arr2[ix]=tmp; KV[bk4].value=arr2.join(', '); renderSection(); updateBar(); return; }
    var ab=e.target.closest('[data-addbtn]');
    if(ab){ var bk5=ab.dataset.addbtn; var inp=document.querySelector('[data-addfor="'+bk5+'"]'); var nv=(inp.value||'').trim(); if(!nv) return; var arr3=listOf(KV[bk5].value); if(!arr3.some(function(x){return x.toUpperCase()===nv.toUpperCase();})) arr3.push(nv); KV[bk5].value=arr3.join(', '); renderSection(); updateBar(); return; }
    var kb=e.target.closest('[data-stk]');
    if(kb){ var si2=Number(kb.dataset.stk); TBL.STATUSES[si2][1]=kb.dataset.k; if(kb.dataset.k!=='TIER') TBL.STATUSES[si2][2]=''; renderSection(); refreshDerived(); updateBar(); return; }
    var sd=e.target.closest('[data-stdel]');
    if(sd){ TBL.STATUSES.splice(Number(sd.dataset.stdel),1); renderSection(); refreshDerived(); updateBar(); return; }
    if(e.target.closest('[data-stadd]')){ TBL.STATUSES.push(['New Status','LEAVE','','','FALSE']); renderSection(); refreshDerived(); updateBar(); return; }
    var od=e.target.closest('[data-ovdel]');
    if(od){ TBL.STATUS_OVERRIDES.splice(Number(od.dataset.ovdel),1); renderSection(); updateBar(); return; }
    if(e.target.closest('[data-ovadd]')){ var tn=tierNames(); TBL.STATUS_OVERRIDES.push(['RANK','',(tn[0]||'Active')+':5, '+(tn.slice(-1)[0]||'Inactive')+':0']); renderSection(); updateBar(); return; }
    var lx=e.target.closest('[data-lx]');
    if(lx){ var ov2=lx.closest('[data-ovi]'); var i2=Number(ov2.dataset.ovi); var steps=parseLadderStr(TBL.STATUS_OVERRIDES[i2][2])||[]; steps.splice(Number(lx.dataset.lx),1); TBL.STATUS_OVERRIDES[i2][2]=ladderStr(steps); renderSection(); updateBar(); return; }
    var la=e.target.closest('[data-laddstep]');
    if(la){ var i3=Number(la.dataset.laddstep); var steps2=parseLadderStr(TBL.STATUS_OVERRIDES[i3][2])||[]; steps2.push({name:tierNames()[0]||'Active', min:'0'}); TBL.STATUS_OVERRIDES[i3][2]=ladderStr(steps2); renderSection(); updateBar(); return; }
  });
  $('content').addEventListener('keydown',function(e){
    if(e.key==='Enter' && e.target.dataset && e.target.dataset.addfor){ e.preventDefault(); var btn=document.querySelector('[data-addbtn="'+e.target.dataset.addfor+'"]'); if(btn) btn.click(); }
  });
  if(navigator.platform && navigator.platform.indexOf('Mac')!==-1) $('qkbd').textContent='⌘K';

  boot();
</script>
</body>
